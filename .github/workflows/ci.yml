name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
      - run: uv sync --dev --no-editable
      - run: uv run ruff check .
      - run: uv run pytest
